<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>📊 로스율 계산기</title>
<meta name="theme-color" content="#9ACD32">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#f5f7f1;max-width:700px;margin:auto;padding:16px}
.container{display:flex;flex-direction:column;gap:16px}.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1{text-align:center;font-size:28px}h2{font-size:18px;margin-bottom:12px}
.segment{display:flex;gap:10px}.segment button,.btn{height:46px;border:none;border-radius:12px;font-weight:700}
.segment button{flex:1;background:#e5e5e5}.active{background:#9ACD32!important;color:#fff}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px;position:relative}
.label{width:28px;text-align:center;font-weight:700}
input{flex:1;height:46px;border:1px solid #ddd;border-radius:10px;padding:0 12px;font-size:16px}
.del{width:42px;height:42px;border:none;border-radius:10px;background:#eee;transition:.2s}
.del.ready{background:#ff6b6b;color:#fff;animation:shake .35s}
.tip{display:none;color:#ff6b6b;font-size:12px;margin:2px 0 8px 36px}
.tip.show{display:block}
@keyframes shake{25%{transform:translateX(-2px)}50%{transform:translateX(2px)}75%{transform:translateX(-2px)}}
.btn{width:100%;background:#9ACD32;color:#fff;margin-top:10px}.reset{background:#ff6b6b}
.hidden{display:none}.result{display:flex;justify-content:space-between;padding:10px 0}.big{font-size:28px;font-weight:700}
.badge{display:inline-block;padding:10px 14px;border-radius:30px;font-weight:700;margin-top:10px}.green{background:#d9f4d9}.red{background:#ffd4d4}
.info{margin-top:10px;color:#666}.fixed{font-size:18px;font-weight:700;color:#6a8f00}
</style></head><body><div class="container"><h1>📊 로스율 계산기</h1>
<div class="card"><div class="segment"><button id="limitBtn" class="active">허용 금액</button><button id="rateBtn">로스율 계산</button></div></div>
<div class="card"><h2>기간 매출</h2><div id="salesArea"></div><button class="btn" onclick="addRow()">+ 행 추가</button><button class="btn reset" onclick="resetAll()">초기화</button></div>
<div class="card"><div id="limitArea"><h2>허용 기준</h2><div class="fixed">0.2% (고정)</div></div><div id="rateArea" class="hidden"><h2>실제 차이금액</h2><input id="lossAmount"></div></div>
<div class="card"><h2>📈 결과</h2><div class="result"><span>총 매출</span><span id="totalSales">0원</span></div><div class="result"><span id="title">허용 차이금액</span><span id="value" class="big">0원</span></div><div id="status"></div><div id="extra" class="info"></div></div></div>
<script>
const RATE=0.002,salesArea=document.getElementById("salesArea");let mode='limit';
function updateLabels(){document.querySelectorAll('.row').forEach((r,i)=>r.querySelector('.label').textContent=i+1)}
function clearReady(){document.querySelectorAll('.del').forEach(b=>b.classList.remove('ready'));document.querySelectorAll('.tip').forEach(t=>t.classList.remove('show'))}
function addRow(v=''){const row=document.createElement('div');row.className='row';row.innerHTML='<div class="label"></div><input class="salesInput" value="'+v+'"><button class="del">🗑️</button>';const tip=document.createElement('div');tip.className='tip';tip.textContent='한 번 더 Backspace를 누르거나 휴지통을 누르면 삭제됩니다.';salesArea.append(row,tip);const input=row.querySelector('input'),del=row.querySelector('.del');let armed=false;
input.addEventListener('input',e=>{armed=false;clearReady();fmt(e)});
input.addEventListener('blur',()=>setTimeout(clearReady,150));
input.addEventListener('keydown',e=>{const rows=[...document.querySelectorAll('.salesInput')];
if(e.key==='Enter'&&rows.at(-1)===input){e.preventDefault();addRow();const n=document.querySelectorAll('.salesInput').at(-1);setTimeout(()=>{n.focus();n.click();},20);return;}
if(e.key==='Backspace'&&input.value===''){e.preventDefault();if(!armed){clearReady();armed=true;del.classList.add('ready');tip.classList.add('show');return;}
const idx=rows.indexOf(input);const prev=rows[idx-1];tip.remove();row.remove();updateLabels();calc();if(prev)setTimeout(()=>prev.focus(),20);}
});
del.onclick=()=>{const rows=[...document.querySelectorAll('.salesInput')];if(rows.length===1){input.value='';calc();return;}const idx=rows.indexOf(input);const prev=rows[idx-1];tip.remove();row.remove();updateLabels();calc();if(prev)prev.focus();}
salesArea.appendChild(document.createComment(''));updateLabels();calc();}
function fmt(e){let v=e.target.value.replace(/,/g,'');if(v&&!isNaN(v))e.target.value=Number(v).toLocaleString();calc()}
function total(){let t=0;document.querySelectorAll('.salesInput').forEach(i=>t+=Number(i.value.replace(/,/g,''))||0);return t}
function calc(){const s=total(),l=Number((lossAmount.value||'0').replace(/,/g,''));totalSales.innerText=s.toLocaleString()+'원';status.innerHTML='';extra.innerHTML='';if(mode==='limit'){title.innerText='허용 차이금액';value.innerText=Math.round(s*RATE).toLocaleString()+'원';}else{const m=s*RATE,r=s?(l/s)*100:0,e=Math.max(l-m,0);title.innerText='현재 로스율';value.innerText=r.toFixed(4)+'%';status.innerHTML=l<=m?'<div class="badge green">🟢 정상</div>':'<div class="badge red">🔴 기준 초과</div>';extra.innerHTML='허용 차이금액 : '+Math.round(m).toLocaleString()+'원<br>초과 금액 : '+Math.round(e).toLocaleString()+'원';}}
function resetAll(){salesArea.innerHTML='';lossAmount.value='';addRow()}
limitBtn.onclick=()=>{mode='limit';limitBtn.classList.add('active');rateBtn.classList.remove('active');limitArea.classList.remove('hidden');rateArea.classList.add('hidden');calc()}
rateBtn.onclick=()=>{mode='rate';rateBtn.classList.add('active');limitBtn.classList.remove('active');rateArea.classList.remove('hidden');limitArea.classList.add('hidden');calc()}
lossAmount.oninput=fmt;addRow();
</script></body></html>
