<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>📊 로스율 계산기</title>
<meta name="theme-color" content="#9ACD32">
<meta name="apple-mobile-web-app-title" content="로스율계산기">
<meta name="application-name" content="로스율계산기">
<link class="no-print" rel="apple-touch-icon" href="icon-180.png">
<link class="no-print" rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link class="no-print" rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#f5f7f1;max-width:700px;margin:auto;padding:16px}
.container{display:flex;flex-direction:column;gap:16px}.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1{text-align:center;font-size:28px}h2{font-size:18px;margin-bottom:12px}
.segment{display:flex;gap:10px}.segment button,.btn{height:46px;border:none;border-radius:12px;font-weight:700}
.segment button{flex:1;background:#e5e5e5}.active{background:#9ACD32!important;color:#fff}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px;position:relative}
.label{width:28px;text-align:center;font-weight:700}
input{flex:1;height:46px;border:1px solid #ddd;border-radius:10px;padding:0 12px;font-size:16px}
.del{width:42px;height:42px;border:none;border-radius:10px;background:#eee;transition:.2s}
.del.ready{background:#ff6b6b;color:#fff;animation:shake .35s}
.tip{display:none;color:#ff6b6b;font-size:12px;margin:2px 0 8px 36px}
.tip.show{display:block}
@keyframes shake{25%{transform:translateX(-2px)}50%{transform:translateX(2px)}75%{transform:translateX(-2px)}}
.btn{width:100%;background:#9ACD32;color:#fff;margin-top:10px}.reset{background:#ff6b6b}
.hidden{display:none}
.result{display:flex;justify-content:space-between;padding:10px 0}.big{font-size:28px;font-weight:700}
.badge{display:inline-block;padding:10px 14px;border-radius:30px;font-weight:700;margin-top:10px}
.green{background:#d9f4d9;color:#2e7d32}
.blue{background:#e3f2fd;color:#1565c0}
.red{background:#ffd4d4;color:#c62828}
.info{margin-top:10px;color:#666;line-height:1.6}
.fixed{font-size:18px;font-weight:700;color:#6a8f00}
.text-red{color:#ff6b6b;font-weight:bold}
.text-blue{color:#1e88e5;font-weight:bold}

/* PDF 저장 단독 버튼 스타일 */
.btn-pdf{background:#333;margin-top:15px}
.print-header { display:none }

/* 🖨️ PDF 인쇄 및 저장용 전용 CSS */
@media print {
  body { background:#fff; padding:0 }
  .no-print, .segment, .btn, .reset, .del, .tip, h1.no-print { display:none!important }
  .card { box-shadow:none; padding:10px 0; border-bottom:1px dashed #ccc; border-radius:0 }
  .print-header { display:block; text-align:center; margin-bottom:20px; border-bottom:2px solid #333; padding-bottom:10px }
  .result { border-bottom:1px solid #eee }
  .badge { border:1px solid currentColor; background:none!important; padding:4px 8px }
  
  input { 
    border:none!important; 
    background:transparent!important; 
    padding:0!important; 
    height:auto!important; 
    font-size:16px!important; 
    color:#000!important;
    text-align:right; 
    pointer-events:none;
  }
  .row { margin-bottom:10px; border-bottom:1px solid #f0f0f0; padding-bottom:4px; }
  h2 { font-size:16px; margin-bottom:8px; color:#333; display:block!important; }
}
</style>
</head>

<body><div class="container">
<h1 class="no-print">📊 로스율 계산기</h1>

<div class="print-header">
  <h1>📊 로스율 계산 결과 보고서</h1>
  <p style="text-align:right; color:#666; font-size:12px; margin-top:5px;">출력일시: <span id="printDate"></span></p>
</div>

<div class="card no-print"><div class="segment"><button id="limitBtn" class="active">허용 금액</button><button id="rateBtn">ロ스율 계산</button></div></div>
<div class="card"><h2>기간 매출</h2><div id="salesArea"></div><button class="btn no-print" onclick="addRow()">+ 행 추가</button><button class="btn reset no-print" onclick="resetAll()">초기화</button></div>
<div class="card"><div id="limitArea"><h2>허용 기준</h2><div class="fixed">0.2% (고정)</div></div><div id="rateArea" class="hidden"><h2>실제 차이금액</h2><input id="lossAmount" inputmode="text" placeholder="마이너스(-) 입력 가능"></div></div>
<div class="card"><h2>📈 결과</h2><div class="result"><span>총 매출</span><span id="totalSales">0원</span></div><div class="result"><span id="title">허용 차이금액</span><span id="value" class="big">0원</span></div><div id="status"></div><div id="extra" class="info"></div>
  
  <button class="btn btn-pdf no-print" onclick="saveAsPDF()">📄 PDF 파일로 저장</button>
</div></div>

<script>
const RATE=0.002,salesArea=document.getElementById("salesArea");let mode='limit';
function updateLabels(){document.querySelectorAll('.row').forEach((r,i)=>r.querySelector('.label').textContent=i+1)}
function clearReady(){document.querySelectorAll('.del').forEach(b=>b.classList.remove('ready'));document.querySelectorAll('.tip').forEach(t=>t.classList.remove('show'))}

function addRow(v=''){
  const row=document.createElement('div');
  row.className='row';
  row.innerHTML='<div class="label"></div><input class="salesInput" inputmode="text" value="'+v+'"><button class="del">🗑️</button>';
  const tip=document.createElement('div');
  tip.className='tip';
  tip.textContent='한 번 더 Backspace를 누르거나 휴지통을 누르면 삭제됩니다.';
  salesArea.append(row,tip);
  
  const input=row.querySelector('input'),del=row.querySelector('.del');
  let armed=false;
  
  input.addEventListener('input',e=>{armed=false;clearReady();fmt(e)});
  input.addEventListener('blur',()=>setTimeout(clearReady,150));
  input.addEventListener('keydown',e=>{
    const rows=[...document.querySelectorAll('.salesInput')];
    if(e.key==='Enter'&&rows.at(-1)===input){
      e.preventDefault();
      input.blur(); 
      addRow(); 
      Promise.resolve().then(() => {
        const newInputs = document.querySelectorAll('.salesInput');
        const nextInput = newInputs[newInputs.length - 1];
        if(nextInput) {
          nextInput.focus();
          nextInput.click();
        }
      });
      return;
    }
    if(e.key==='Backspace'&&input.value===''){
      e.preventDefault();
      if(!armed){clearReady();armed=true;del.classList.add('ready');tip.classList.add('show');return;}
      const idx=rows.indexOf(input);const prev=rows[idx-1];tip.remove();row.remove();updateLabels();calc();
      if(prev){ prev.focus(); prev.click(); }
    }
  });
  del.onclick=()=>{
    const rows=[...document.querySelectorAll('.salesInput')];
    if(rows.length===1){input.value='';calc();return;}
    const idx=rows.indexOf(input);const prev=rows[idx-1];tip.remove();row.remove();updateLabels();calc();
    if(prev){ prev.focus(); prev.click(); }
  }
  salesArea.appendChild(document.createComment(''));updateLabels();calc();
}

function fmt(e){
  let cursor = e.target.selectionStart;
  let oldLen = e.target.value.length;
  let v = e.target.value.replace(/[^0-9-]/g,''); 
  if(v === '-') { e.target.value = '-'; return; }
  if(v && !isNaN(v)) {
    e.target.value = Number(v).toLocaleString();
    let newLen = e.target.value.length;
    e.target.setSelectionRange(cursor + (newLen - oldLen), cursor + (newLen - oldLen));
  } else if(!v) {
    e.target.value = '';
  }
  calc();
}

function total(){let t=0;document.querySelectorAll('.salesInput').forEach(i=>t+=Number(i.value.replace(/,/g,''))||0);return t}
function calc(){
  const s=total(),l=Number((lossAmount.value||'0').replace(/,/g,''));
  totalSales.innerText=s.toLocaleString()+'원';
  status.innerHTML='';
  extra.innerHTML='';
  
  if(mode==='limit'){
    title.innerText='허용 차이금액';
    value.innerText=Math.round(s*RATE).toLocaleString()+'원';
    value.className = "big";
  }else{
    const m=s*RATE; 
    const r=s?(l/s)*100:0;
    
    title.innerText='현재 로스율';
    value.innerText=r.toFixed(4)+'%';
    
    if (l < 0) {
      value.className = "big text-blue";
      status.innerHTML='<div class="badge blue">🔵 역로스(과잉)</div>';
      extra.innerHTML='허용 차이금액 : ' + Math.round(m).toLocaleString() + '원<br>' +
                      '역로스 금액 : <span class="text-blue">' + Math.abs(l).toLocaleString() + '원</span>';
    } else if (l <= m) {
      value.className = "big text-blue";
      status.innerHTML='<div class="badge green">🟢 정상 범위</div>';
      extra.innerHTML='허용 차이금액 : ' + Math.round(m).toLocaleString() + '원<br>' +
                      '실제 차이금액 : <span class="text-blue">' + Math.round(l).toLocaleString() + '원</span>';
    } else {
      value.className = "big text-red";
      status.innerHTML='<div class="badge red">🔴 기준 초과</div>';
      const e = l - m;
      extra.innerHTML='허용 차이금액 : ' + Math.round(m).toLocaleString() + '원<br>' +
                      '초과 로스금액 : <span class="text-red">' + Math.round(e).toLocaleString() + '원</span>';
    }
  }
}

function saveAsPDF(){
  const now = new Date();
  document.getElementById('printDate').innerText = now.toLocaleString();
  window.print();
}

function resetAll(){salesArea.innerHTML='';lossAmount.value='';addRow()}
limitBtn.onclick=()=>{mode='limit';limitBtn.classList.add('active');rateBtn.classList.remove('active');limitArea.classList.remove('hidden');rateArea.classList.add('hidden');calc()}
rateBtn.onclick=()=>{mode='rate';rateBtn.classList.add('active');limitBtn.classList.remove('active');rateArea.classList.remove('hidden');limitArea.classList.add('hidden');calc()}
lossAmount.oninput=fmt;addRow();
</script></body></html>
