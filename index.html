<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>📊 로스율 계산기</title>
<meta name="theme-color" content="#9ACD32">
<meta name="apple-mobile-web-app-title" content="로스율계산기">
<meta name="application-name" content="로스율계산기">
<link class="no-print" rel="apple-touch-icon" href="icon-180.png">
<link class="no-print" rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link class="no-print" rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#f5f7f1;max-width:700px;margin:auto;padding:16px}
.container{display:flex;flex-direction:column;gap:16px}.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1{text-align:center;font-size:28px}h2{font-size:18px;margin-bottom:12px}
.segment{display:flex;gap:10px}.segment button,.btn{height:46px;border:none;border-radius:12px;font-weight:700}
.segment button{flex:1;background:#e5e5e5}.active{background:#9ACD32!important;color:#fff}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px;position:relative}
.label{width:28px;text-align:center;font-weight:700}
input{flex:1;height:46px;border:1px solid #ddd;border-radius:10px;padding:0 12px;font-size:16px}
.del{width:42px;height:42px;border:none;border-radius:10px;background:#eee;transition:.2s}
.del.ready{background:#ff6b6b;color:#fff;animation:shake .35s}
.tip{display:none;color:#ff6b6b;font-size:12px;margin:2px 0 8px 36px}
.tip.show{display:block}
@keyframes shake{25%{transform:translateX(-2px)}50%{transform:translateX(2px)}75%{transform:translateX(-2px)}}
.btn{width:100%;background:#9ACD32;color:#fff;margin-top:10px}.reset{background:#ff6b6b}
.hidden{display:none}
.result{display:flex;justify-content:space-between;padding:10px 0}.big{font-size:28px;font-weight:700}
.badge{display:inline-block;padding:10px 14px;border-radius:30px;font-weight:700;margin-top:10px}
.green{background:#d9f4d9;color:#2e7d32}
.blue{background:#e3f2fd;color:#1565c0}
.red{background:#ffd4d4;color:#c62828}
.info{margin-top:10px;color:#666;line-height:1.6}
.fixed{font-size:18px;font-weight:700;color:#6a8f00}
.text-red{color:#ff6b6b;font-weight:bold}
.text-blue{color:#1e88e5;font-weight:bold}

/* PDF 저장 단독 버튼 스타일 */
.btn-pdf{background:#333;margin-top:15px}
.print-header { display:none }

/* 🖨️ PDF 인쇄 및 저장용 전용 CSS */
@media print {
  body { background:#fff; padding:0 }
  .no-print, .segment, .btn, .reset, .del, .tip, h1.no-print { display:none!important }
  .card { box-shadow:none; padding:10px 0; border-bottom:1px dashed #ccc; border-radius:0 }
  .print-header { display:block; text-align:center; margin-bottom:20px; border-bottom:2px solid #333; padding-bottom:10px }
  .result { border-bottom:1px solid #eee }
  .badge { border:1px solid currentColor; background:none!important; padding:4px 8px }
  
  input { 
    border:none!important; 
    background:transparent!important; 
    padding:0!important; 
    height:auto!important; 
    font-size:16px!important; 
    color:#000!important;
    text-align:right; 
    pointer-events:none;
  }
  .row { margin-bottom:10px; border-bottom:1px solid #f0f0f0; padding-bottom:4px; }
  h2 { font-size:16px; margin-bottom:8px; color:#333; display:block!important; }
}
</style>
</head>

<body><div class="container">
<h1 class="no-print">📊 로스율 계산기</h1>

<div class="print-header">
  <h1>📊 로스율 계산 결과 보고서</h1>
  <p style="text-align:right; color:#666; font-size:12px; margin-top:5px;">출력일시: <span id="printDate"></span></p>
</div>

<div class="card no-print"><div class="segment"><button id="limitBtn" class="active">허용 금액</button><button id="rateBtn">ロ스율 계산</button></div></div>
<div class="card"><h2>기간 매출
