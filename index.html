<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>📊 로스율 계산기</title>

<meta name="theme-color" content="#9ACD32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="로스율계산기">
<meta name="application-name" content="로스율계산기">
<!-- 아이폰 -->
<link rel="apple-touch-icon" href="icon-180.png">
<!-- 안드로이드 -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<!-- PWA -->
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{background:#f5f7f1;max-width:700px;margin:auto;padding:16px}
.container{display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1{text-align:center;font-size:28px}
h2{font-size:18px;margin-bottom:12px}
.segment{display:flex;gap:10px}
.segment button,.btn{height:46px;border:none;border-radius:12px;font-weight:700}
.segment button{flex:1;background:#e5e5e5}
.active{background:#9ACD32!important;color:#fff}
.row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.label{width:28px;text-align:center;font-weight:700}
input{flex:1;height:46px;border:1px solid #ddd;border-radius:10px;padding:0 12px;font-size:16px}
.del{width:42px;height:42px;border:none;border-radius:10px;background:#eee}
.btn{width:100%;background:#9ACD32;color:#fff;margin-top:10px}
.reset{background:#ff6b6b}
.hidden{display:none}
.result{display:flex;justify-content:space-between;padding:10px 0}
.big{font-size:28px;font-weight:700}
.badge{display:inline-block;padding:10px 14px;border-radius:30px;font-weight:700;margin-top:10px}
.green{background:#d9f4d9}
.red{background:#ffd4d4}
.info{margin-top:10px;color:#666}
.fixed{font-size:18px;font-weight:700;color:#6a8f00}
</style>
</head>

<body>

<div class="container">

<h1>📊 로스율 계산기</h1>

<div class="card">
<div class="segment">
<button id="limitBtn" class="active">허용 금액</button>
<button id="rateBtn">로스율 계산</button>
</div>
</div>

<div class="card">
<h2>기간 매출</h2>

<div id="salesArea"></div>

<button class="btn" onclick="addRow()">+ 행 추가</button>
<button class="btn reset" onclick="resetAll()">초기화</button>
</div>

<div class="card">

<div id="limitArea">
<h2>허용 기준</h2>
<div class="fixed">0.2% (고정)</div>
</div>

<div id="rateArea" class="hidden">
<h2>실제 차이금액</h2>
<input id="lossAmount" placeholder="금액 입력">
</div>

</div>

<div class="card">

<h2>📈 결과</h2>

<div class="result">
<span>총 매출</span>
<span id="totalSales">0원</span>
</div>

<div class="result">
<span id="title">허용 차이금액</span>
<span id="value" class="big">0원</span>
</div>

<div id="status"></div>
<div id="extra" class="info"></div>

</div>

</div>

<script>

const RATE=0.002;
let mode='limit';
const salesArea=document.getElementById('salesArea');

function updateLabels(){
document.querySelectorAll('.row')
.forEach((r,i)=>r.querySelector('.label').textContent=i+1);
}

function addRow(v=''){
const row=document.createElement('div');

row.className='row';

row.innerHTML=`
<div class="label"></div>
<input class="salesInput" value="${v}">
<button class="del">🗑️</button>
`;

salesArea.appendChild(row);

const input=row.querySelector('input');

input.addEventListener('input',formatNumber);

input.addEventListener('keydown',e=>{

const rows=[...document.querySelectorAll('.salesInput')];

if(e.key==='Enter'&&rows.at(-1)===input){

e.preventDefault();

addRow();

document.querySelectorAll('.salesInput').at(-1).focus();

}

});

input.addEventListener('paste',pasteHandler);

row.querySelector('.del')
.addEventListener('click',()=>{

if(document.querySelectorAll('.row').length===1){

input.value='';

}else{

row.remove();

}

updateLabels();

calculate();

});

updateLabels();

calculate();
}

function pasteHandler(e){

const text=e.clipboardData.getData('text');

if(!text.includes('\n')) return;

e.preventDefault();

const values=text.split(/\r?\n/)
.filter(v=>v.trim());

salesArea.innerHTML='';

values.forEach(v=>addRow(v.trim()));

document.querySelectorAll('.salesInput')
.forEach(i=>i.value=Number(i.value.replace(/,/g,''))
.toLocaleString());

calculate();
}

function formatNumber(e){

let v=e.target.value.replace(/,/g,'');

if(v&&!isNaN(v)){

e.target.value=Number(v).toLocaleString();

}

calculate();
}

function totalSales(){

let total=0;

document.querySelectorAll('.salesInput')

.forEach(i=>{

total+=Number(i.value.replace(/,/g,''))||0;

});

return total;
}

function calculate(){

const sales=totalSales();

const loss=Number(
(document.getElementById('lossAmount').value||'0')
.replace(/,/g,''));

document.getElementById('totalSales').innerText=sales.toLocaleString()+'원';

document.getElementById('status').innerHTML='';

document.getElementById('extra').innerHTML='';

if(mode==='limit'){

const max=sales*RATE;

document.getElementById('title').innerText='허용 차이금액';

document.getElementById('value').innerText=Math.round(max).toLocaleString()+'원';

}else{

const rate=sales?(loss/sales)*100:0;

const max=sales*RATE;

const exceed=Math.max(loss-max,0);

document.getElementById('title').innerText='현재 로스율';

document.getElementById('value').innerText=rate.toFixed(4)+'%';

document.getElementById('status').innerHTML=

loss<=max
?'<div class="badge green">🟢 정상</div>'
:'<div class="badge red">🔴 기준 초과</div>';

document.getElementById('extra').innerHTML=`
허용 차이금액 : ${Math.round(max).toLocaleString()}원<br>
초과 금액 : ${Math.round(exceed).toLocaleString()}원
`;

}

}

function resetAll(){

salesArea.innerHTML='';

document.getElementById('lossAmount').value='';

addRow();

}

document.getElementById('limitBtn').onclick=()=>{

mode='limit';

limitBtn.classList.add('active');

rateBtn.classList.remove('active');

limitArea.classList.remove('hidden');

rateArea.classList.add('hidden');

calculate();

};

document.getElementById('rateBtn').onclick=()=>{

mode='rate';

rateBtn.classList.add('active');

limitBtn.classList.remove('active');

rateArea.classList.remove('hidden');

limitArea.classList.add('hidden');

calculate();

};

document.getElementById('lossAmount')

.addEventListener('input',formatNumber);

addRow();

</script>

</body>
</html>
