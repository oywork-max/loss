<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>📊 로스율 계산기</title>
<meta name="theme-color" content="#9ACD32">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<!-- 아이폰 -->
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-title" content="로스율계산기">
<!-- 안드로이드 -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta name="application-name" content="로스율계산기">
<!-- PWA -->
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">


<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,BlinkMacSystemFont,sans-serif; }
body{ background:#f5f7f1; max-width:600px; margin:auto; padding:16px; }
.container{ display:flex; flex-direction:column; gap:16px; }
.card{ background:#fff; border-radius:18px; padding:18px; box-shadow:0 2px 8px rgba(0,0,0,.08); }
h1{ font-size:28px; text-align:center; margin-bottom: 8px;}
h2{ font-size:18px; margin-bottom:12px; }
.segment{ display:flex; gap:10px; }
.segment button{ flex:1; height:46px; border:none; border-radius:12px; font-size:15px; font-weight:700; background:#e5e5e5; cursor:pointer;}
.segment .active{ background:#9ACD32; color:#fff; }
.row{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.label{ width:24px; text-align:center; font-weight:700; }
input{ flex:1; height:46px; border:1px solid #ddd; border-radius:10px; padding:0 12px; font-size:16px; }
.deleteBtn{ width:40px; height:40px; border:none; border-radius:10px; background:#eee; font-size:18px; cursor:pointer;}
.actionBtn{ width:100%; height:46px; border:none; border-radius:12px; background:#9ACD32; color:#fff; font-size:16px; font-weight:700; margin-top:10px; cursor:pointer;}
.resetBtn{ background:#ff6b6b; }
.quickBtns{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
.quickBtns button{ flex:1; min-width:60px; height:38px; border:none; border-radius:10px; background:#edf6d6; font-weight:700; cursor:pointer;}
.hidden{ display:none; }
.resultBox{ min-height:120px; }
.result{ display:flex; justify-content:space-between; padding:10px 0; align-items: center;}
.big{ font-size:24px; font-weight:700; color: #333; }
.badge{ display:inline-block; padding:10px 14px; border-radius:30px; font-weight:700; margin-top:10px; }
.green{background:#d9f4d9;} .yellow{background:#fff4c7;} .orange{background:#ffd9b3;} .red{background:#ffd4d4;}
</style>
</head>
<body>

<div class="container">
    <h1>📊 로스율 계산기</h1>
    
    <div class="card">
        <div class="segment">
            <button id="limitBtn" class="active">로스 한도 계산</button>
            <button id="rateBtn">로스율 계산</button>
        </div>
    </div>

    <div class="card">
        <h2>매출 입력</h2>
        <div id="salesArea"></div>
        <button class="actionBtn" onclick="addRow()">+ 행 추가</button>
        <button class="actionBtn resetBtn" onclick="resetAll()">초기화</button>
    </div>

    <div class="card">
        <div id="limitArea">
            <h2>목표 로스율 (%)</h2>
            <input id="targetRate" type="number" step="0.01" value="2">
            <div class="quickBtns">
                <button onclick="setRate(0.05)">0.5%</button>
                <button onclick="setRate(0.1)">0.1%</button>
                <button onclick="setRate(0.2)">0.2%</button>
                <button onclick="setRate(0.25)">0.25%</button>
                <button onclick="setRate(0.3)">0.3%</button>
            </div>
        </div>

        <div id="rateArea" class="hidden">
            <h2>실제 로스 금액</h2>
            <input id="lossAmount" type="text" inputmode="numeric" autocomplete="off">
        </div>
    </div>

    <div class="card">
        <h2>📈 결과</h2>
        <div class="resultBox">
            <div class="result">
                <span>총 매출</span>
                <span id="totalSales">0원</span>
            </div>
            <div class="result">
                <span id="resultTitle">허용 로스 금액</span>
                <span id="resultValue" class="big">0원</span>
            </div>
            <div id="status"></div>
        </div>
    </div>
</div>

<script>
let mode='limit';
const salesArea=document.getElementById('salesArea');

function updateLabels(){
    document.querySelectorAll('.row').forEach((row,index)=>{
        row.querySelector('.label').textContent=index+1;
    });
}

function addRow(){
    const row=document.createElement('div');
    row.className='row';
    row.innerHTML=`
        <div class="label"></div>
        <input class="salesInput" type="text" inputmode="numeric" autocomplete="off">
        <button class="deleteBtn">🗑️</button>
    `;
    salesArea.appendChild(row);

    const input=row.querySelector('input');
    const deleteBtn=row.querySelector('button');

    input.addEventListener('input',formatNumber);
    input.addEventListener('keydown',(e)=>{
        if(e.key==='Enter'){
            e.preventDefault();
            const rows=document.querySelectorAll('.row');
            const lastRow=rows[rows.length-1];
            if(row===lastRow){
                addRow();
                const newRows=document.querySelectorAll('.row');
                newRows[newRows.length-1].querySelector('input').focus();
            }
        }
    });

    deleteBtn.addEventListener('click',()=>{
        const rows=document.querySelectorAll('.row');
        if(rows.length===1){
            input.value='';
        } else {
            row.remove();
        }
        updateLabels();
        calculate();
    });

    updateLabels();
    calculate();
}

function formatNumber(e){
    let value=e.target.value.replace(/[^0-9]/g,'');
    if(value===''){
        e.target.value='';
    } else {
        e.target.value=Number(value).toLocaleString();
    }
    calculate();
}

function totalSales(){
    let total=0;
    document.querySelectorAll('.salesInput').forEach(v=>{
        total+=Number(v.value.replace(/,/g,''))||0;
    });
    return total;
}

function setRate(v){
    document.getElementById('targetRate').value=v;
    calculate();
}

function calculate(){
    let sales=totalSales();
    document.getElementById('totalSales').innerText=sales.toLocaleString()+'원';
    const status=document.getElementById('status');
    status.innerHTML='';

    if(mode==='limit'){
        let rate=Number(document.getElementById('targetRate').value)||0;
        // rate가 퍼센트 단위(예: 2)이므로 sales * (rate / 100)으로 계산 시 정상 금액 출력
        let maxLoss=Math.round(sales*rate/100); 
        
        document.getElementById('resultTitle').innerText='허용 로스 금액';
        document.getElementById('resultValue').innerText=maxLoss.toLocaleString()+'원';
    } else {
        let loss=Number(document.getElementById('lossAmount').value.replace(/,/g,''))||0;
        let rate=sales?(loss/sales)*100:0;
        
        document.getElementById('resultTitle').innerText='현재 로스율';
        document.getElementById('resultValue').innerText=rate.toFixed(2)+'%';

        let cls='', txt='';
        if(rate<1){ cls='green'; txt='🟢 우수'; }
        else if(rate<2){ cls='yellow'; txt='🟡 관리 필요'; }
        else if(rate<3){ cls='orange'; txt='🟠 주의'; }
        else { cls='red'; txt='🔴 위험'; }
        status.innerHTML=`<div class="badge ${cls}">${txt}</div>`;
    }
}

function resetAll(){
    salesArea.innerHTML='';
    document.getElementById('targetRate').value=2; // 초기값 수정
    document.getElementById('lossAmount').value='';
    addRow();
    calculate();
}

document.getElementById('limitBtn').onclick=()=>{
    mode='limit';
    document.getElementById('limitBtn').classList.add('active');
    document.getElementById('rateBtn').classList.remove('active');
    document.getElementById('limitArea').classList.remove('hidden');
    document.getElementById('rateArea').classList.add('hidden');
    calculate();
};

document.getElementById('rateBtn').onclick=()=>{
    mode='rate';
    document.getElementById('rateBtn').classList.add('active');
    document.getElementById('limitBtn').classList.remove('active');
    document.getElementById('rateArea').classList.remove('hidden');
    document.getElementById('limitArea').classList.add('hidden');
    calculate();
};

document.getElementById('targetRate').addEventListener('input',calculate);
document.getElementById('lossAmount').addEventListener('input',formatNumber);

// 초기 실행
addRow();
calculate();
</script>
</body>
</html>
